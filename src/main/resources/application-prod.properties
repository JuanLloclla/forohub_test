# Desactivar logs SQL (mejor rendimiento y seguridad)
spring.jpa.show-sql=false

# Mantener Swagger activo (lo usare como cliente)
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true

# Permite detectar HTTPS correctamente cuando se despliega detras de un proxy inverso (Render, Koyeb, etc.)
server.forward-headers-strategy=framework
